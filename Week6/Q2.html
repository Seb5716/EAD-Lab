<!DOCTYPE html>
<html lang="en">
<head>
  <title>Week-6 Exercise 2</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <h3 class="text-center">Student Registration Form</h3>

    <div id="successAlert" class="alert alert-success d-none">Form submitted successfully!</div>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="mb-3">
          <label class="form-label">Student Name</label>
          <input type="text" class="form-control" name="S_name">
        </div>
        <div class="mb-3">
          <label class="form-label">Roll Number</label>
          <input type="number" class="form-control" name="roll_no">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="S_email">
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="number" class="form-control" name="S_no">
        </div>
        <div class="mb-3">
          <label class="form-label">Gender</label><br>
          <input type="radio" name="gender" value="male"> Male &nbsp;
          <input type="radio" name="gender" value="female"> Female
        </div>
        <div class="mb-3">
          <label class="form-label">Department</label>
          <select class="form-select" name="branch">
            <option value="it">IT</option>
            <option value="cse">CSE</option>
            <option value="aids">AIDS</option>
            <option value="aiml">AIML</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Subjects</label><br>
          <input type="checkbox" name="sub" value="EAD"> EAD &nbsp;
          <input type="checkbox" name="sub" value="DBMS"> DBMS &nbsp;
          <input type="checkbox" name="sub" value="PQT"> PQT &nbsp;
          <input type="checkbox" name="sub" value="ES"> ES
        </div>
        <div class="mb-3">
          <label class="form-label">Upload Photo</label>
          <input type="file" class="form-control" name="photo">
        </div>
        <button class="btn btn-success" onclick="document.getElementById('successAlert').classList.remove('d-none')">Submit</button>
        <button class="btn btn-secondary" type="reset">Reset</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
